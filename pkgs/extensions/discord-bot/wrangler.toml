name = "toban-discord-bot"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 is shared with extensions/identity. The bot doesn't read/write this DB
# directly (it talks to identity over HTTP), but the binding is kept so future
# bot-local tables (e.g. thx_log) can be added without re-config.
[[d1_databases]]
binding = "DB"
database_name = "toban-identity"
database_id = "6332ba44-8dfe-44c5-8baa-356763b4c7bf"

# Same-account Workers cannot reach each other through their public
# workers.dev URLs (Cloudflare error 1042). A service binding routes
# fetch() calls to env.IDENTITY directly without leaving the edge.
[[services]]
binding = "IDENTITY"
service = "toban-identity"

[vars]
# Subgraph endpoint for resolving each workspace's current ThanksToken
# address (see chain.ts:resolveThanksTokenAddress). The bot never
# hardcodes a single token address — each workspace owns its own clone
# and may switch implementations via BigBang.switchThanksToken.
GOLDSKY_GRAPHQL_ENDPOINT = "https://api.goldsky.com/api/public/project_cm4r39viziqcd01wo6y96c1r6/subgraphs/toban-sepolia/1.0.3/gn"
TOBAN_FRONTEND_URL = "http://localhost:5173"
BOT_WORKER_URL = "https://toban-discord-bot.kawabeyuki23.workers.dev"
RPC_URL = "https://eth-sepolia.g.alchemy.com/v2/pQeMdJwPF6EI-mS_F4d0oJXzDq68coxL"
CHAIN_ID = "11155111"
# Used only for ENS name resolution in /thx (ENS records live on mainnet
# even though we transact on Sepolia). A public RPC is fine — we never
# send anything here, just `getEnsAddress` view calls.
MAINNET_RPC_URL = "https://eth.llamarpc.com"
TURNKEY_API_BASE_URL = "https://api.turnkey.com"
TURNKEY_ORGANIZATION_ID = "24cfae8c-aae0-4341-8492-295057f66bac"
TURNKEY_BOT_SIGNER_ADDRESS = "0xae4E13De7C14Dff7ff296De69cADf3A7F5208461"
IDENTITY_WORKER_URL = "https://toban-identity.kawabeyuki23.workers.dev"

# Secrets (set via `wrangler secret put <NAME>`):
#   DISCORD_PUBLIC_KEY            - Discord interactions Ed25519 public key (hex)
#   DISCORD_BOT_TOKEN             - Discord bot token (for REST API: register
#                                   slash commands, send followups)
#   DISCORD_APP_ID                - Discord application id
#   DISCORD_CLIENT_SECRET         - For OAuth bot-install callback
#   TURNKEY_API_PUBLIC_KEY        - Turnkey API stamper public key (P-256, hex)
#   TURNKEY_API_PRIVATE_KEY       - Turnkey API stamper private key (PEM PKCS8)
#   VERIFIER_PRIVATE_KEY          - ES256 (P-256) private key for verifier_token
#                                   JWT signing (PEM PKCS8). Identity worker
#                                   holds the matching public key.
#   INSTALL_STATE_SECRET          - HMAC secret for OAuth install state JWT
