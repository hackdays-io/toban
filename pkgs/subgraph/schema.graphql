type Workspace @entity {
  id: ID!
  creator: String!
  owner: String!
  topHatId: BigInt!
  hatterHatId: BigInt!
  memberHatId: BigInt!
  operatorHatId: BigInt!
  creatorHatId: BigInt!
  minterHatId: BigInt!
  hatsTimeFrameModule: String!
  hatsHatCreatorModule: String!
  hatsFractionTokenModule: HatsFractionTokenModule!
  hatsQuestModule: String!
  thanksToken: ThanksToken!
  splitCreator: String!
  blockTimestamp: BigInt!
  blockNumber: BigInt!
  quests: [Quest!]! @derivedFrom(field: "workspace")
  escrowedRoleShares: [EscrowedRoleShare!]! @derivedFrom(field: "workspace")
}

type HatsFractionTokenModule @entity {
  id: ID!
  workspaceId: ID!
  initializedTokens: [InitializedFractionToken!]!
    @derivedFrom(field: "hatsFractionTokenModule")
  transfers: [TransferFractionToken!]!
    @derivedFrom(field: "hatsFractionTokenModule")
  balances: [BalanceOfFractionToken!]!
    @derivedFrom(field: "hatsFractionTokenModule")
}

type InitializedFractionToken @entity {
  id: ID!
  hatsFractionTokenModule: HatsFractionTokenModule!
  tokenId: BigInt!
  hatId: BigInt!
  wearer: String!
  workspaceId: ID!
  blockTimestamp: BigInt!
  blockNumber: BigInt!
}

type TransferFractionToken @entity {
  id: ID!
  hatsFractionTokenModule: HatsFractionTokenModule!
  from: String!
  to: String!
  tokenId: BigInt!
  amount: BigInt!
  workspaceId: ID!
  blockTimestamp: BigInt!
  blockNumber: BigInt!
}

type BalanceOfFractionToken @entity {
  id: ID!
  hatsFractionTokenModule: HatsFractionTokenModule!
  owner: String!
  tokenId: BigInt!
  balance: BigInt!
  workspaceId: ID!
  hatId: BigInt!
  wearer: String!
  updatedAt: BigInt!
}

type ThanksToken @entity {
  id: ID!
  workspaceId: ID!
  mints: [MintThanksToken!]! @derivedFrom(field: "thanksToken")
  transfers: [TransferThanksToken!]! @derivedFrom(field: "thanksToken")
  mintAmounts: [AmountOfMintThanksToken!]! @derivedFrom(field: "thanksToken")
  balances: [BalanceOfThanksToken!]! @derivedFrom(field: "thanksToken")
}

type MintThanksToken @entity {
  id: ID!
  thanksToken: ThanksToken!
  from: String!
  to: String!
  amount: BigInt!
  data: Bytes!
  workspaceId: ID!
  blockTimestamp: BigInt!
  blockNumber: BigInt!
}

type TransferThanksToken @entity {
  id: ID!
  thanksToken: ThanksToken!
  from: String!
  to: String!
  amount: BigInt!
  workspaceId: ID!
  blockTimestamp: BigInt!
  blockNumber: BigInt!
}

type AmountOfMintThanksToken @entity {
  id: ID!
  thanksToken: ThanksToken!
  sender: String!
  amount: BigInt!
  workspaceId: ID!
  updatedAt: BigInt!
}

type BalanceOfThanksToken @entity {
  id: ID!
  thanksToken: ThanksToken!
  owner: String!
  balance: BigInt!
  workspaceId: ID!
  updatedAt: BigInt!
}

type HatsQuestModule @entity {
  id: ID!
  workspaceId: ID!
  quests: [Quest!]! @derivedFrom(field: "questModuleEntity")
}

enum QuestStatus {
  Open
  PendingReview
  Completed
  Cancelled
}

enum SubmissionOutcome {
  Pending
  Withdrawn
  Rejected
  Approved
}

type Quest @entity {
  id: ID!
  workspace: Workspace!
  questModuleEntity: HatsQuestModule!
  questModule: String!
  questId: BigInt!
  hatId: BigInt!
  wearer: String!
  creator: String!
  submitter: String
  amount: BigInt!
  status: QuestStatus!
  metadataHash: Bytes!
  approvalCount: Int!
  attemptCount: Int!
  attempts: [SubmissionAttempt!]! @derivedFrom(field: "quest")
  createdAt: BigInt!
  submittedAt: BigInt
  completedAt: BigInt
  cancelledAt: BigInt
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  txHash: Bytes!
}

type SubmissionAttempt @entity {
  id: ID!
  quest: Quest!
  attemptIndex: Int!
  submitter: String!
  submittedAt: BigInt!
  outcome: SubmissionOutcome!
  withdrawnAt: BigInt
  rejectedAt: BigInt
  approvedAt: BigInt
  approvals: [QuestApproval!]! @derivedFrom(field: "attempt")
}

type QuestApproval @entity {
  id: ID!
  quest: Quest!
  attempt: SubmissionAttempt!
  approver: String!
  approvedAt: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type EscrowedRoleShare @entity {
  id: ID!
  workspace: Workspace!
  creator: String!
  hatId: BigInt!
  wearer: String!
  amount: BigInt!
  updatedAt: BigInt!
}
